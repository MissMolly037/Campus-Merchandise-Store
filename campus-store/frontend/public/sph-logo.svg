<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" fill="none">
  <!-- Circle icon -->
  <circle cx="50" cy="50" r="46" fill="#111111"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="white" stroke-width="2"/>
  <!-- S letter -->
  <text x="50" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="white" transform="rotate(-5, 50, 50)" style="font-style:italic">S</text>

  <!-- sph text brushstroke style -->
  <text x="115" y="60" font-family="Georgia, serif" font-size="46" font-weight="bold" font-style="italic" fill="#111111">sph</text>

  <!-- CLOCK IT! tagline -->
  <text x="140" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="4" fill="#111111">CLOCK IT!</text>
</svg>
